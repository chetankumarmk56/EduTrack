worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Load Balancing across multiple backend replicas
    # In Docker Compose, service names resolve to container IPs
    upstream backend_api {
        server backend1:8000;
        server backend2:8000;
    }

    server {
        listen       80;
        server_name  localhost;

        # AI generation endpoints — long-running OpenAI calls (Lesson Plan
        # can take minutes for many classes). Without this the default 60s
        # proxy_read_timeout returns a 504 before generation finishes.
        # Regex locations win over the prefix `location /` for these paths.
        location ~ ^/api/(lesson-plan/generate|question-bank/generate-s3)$ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout    75s;
            proxy_read_timeout    75s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
