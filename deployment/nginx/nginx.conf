# EduTrack Nginx Load Balancer Configuration
# This file configures Nginx to act as a reverse proxy and load balancer
# distributing traffic across multiple FastAPI backend instances.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream definition for horizontal scaling
    # Requests will be distributed across these three instances using Round Robin
    upstream backend_servers {
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;
    }

    server {
        listen       80;
        server_name  localhost;

        # AI generation endpoints — long-running OpenAI calls.
        #
        # Lesson Plan generates a full class-by-class plan (one detailed
        # object per class) and can take a few minutes for many classes;
        # the default 60s proxy_read_timeout would cut it off with a 504
        # (this was the production "Lesson Plan 504 Gateway Time-out" bug).
        # Give these two endpoints generous read/send headroom. Regex
        # locations are matched before the prefix `location /`, so this wins
        # for the AI paths only — every other endpoint keeps the tighter
        # default below.
        location ~ ^/api/(lesson-plan/generate|question-bank/generate-s3)$ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # Main API entry point
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Bounded read timeout for normal endpoints (default is 60s).
            proxy_connect_timeout 30s;
            proxy_send_timeout    75s;
            proxy_read_timeout    75s;

            # WebSocket support (Required for Transport Tracking)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Error page configuration
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}

# SCALING NOTES:
# 1. Total Throughput: By adding servers to the 'upstream' block, you increase the total concurrent request capacity.
# 2. Fault Tolerance: If one instance (e.g. port 8001) goes down, Nginx automatically shifts load to 8002 and 8003.
# 3. Statelessness: Ensure no data is stored in memory (RAM). Use Redis or DB for all persistent state.
