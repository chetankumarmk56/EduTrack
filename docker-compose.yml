version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edutrack_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luffy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-school}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luffy} -d ${POSTGRES_DB:-school}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: edutrack_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-luffy}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-school}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - SECRET_KEY=${SECRET_KEY:-change-me-to-32-or-more-random-chars-please}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
