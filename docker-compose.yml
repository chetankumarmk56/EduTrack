version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edutrack_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-edutrack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutrack_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-edutrack}
      - SECRET_KEY=${SECRET_KEY:-your-secure-secret-key}
      - ENVIRONMENT=dev
    ports:
      - "8000:8000"
    depends_on:
      - db
    # Command to run migrations then start the server
    entrypoint: >
      bash -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edutrack_frontend
    restart: always
    environment:
      - VITE_API_URL=http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
