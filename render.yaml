services:
  # FastAPI Backend
  - type: web
    name: edutrack-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: find . -name "*.pyc" -delete 2>/dev/null; find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null; pip install -r requirements.txt
    startCommand: python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # User will provide this from Neon
      - key: SECRET_KEY
        generateValue: true # Render will generate a random secret
      - key: FRONTEND_URL
        sync: false # Vercel / CDN URL for the admin web frontend (CORS)
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONDONTWRITEBYTECODE
        value: 1
      - key: PYTHONPYCACHEPREFIX
        value: /tmp/pycache
      # ── Razorpay (required in prod — startup fails if missing or placeholder) ──
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # ── Twilio voice calls (optional — service degrades gracefully if absent) ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      # ── AI features (optional) ──
      - key: GOOGLE_API_KEY
        sync: false
