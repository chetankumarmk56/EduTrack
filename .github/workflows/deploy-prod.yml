name: Deploy (production)

# Production deploy pipeline. Stages run in order:
#   security scan -> deploy to EC2 (Docker Compose) -> public health check
#
# Target: a single Ubuntu EC2 box running the backend Docker Compose stack
# (backend + worker + redis) against AWS RDS, fronted by host nginx (TLS via
# certbot). The deploy SSHes in and does a CODE-ONLY update: it checks out just
# the `backend/` source from main, rebuilds the image, runs `alembic upgrade
# head`, and restarts — using the box's OWN compose file. It deliberately does
# NOT touch docker-compose.yml or backend/.env, which are maintained by hand on
# the server.
#
# Required GitHub Actions secrets:
#   EC2_SSH_HOST     - public IP or DNS of the EC2 box (e.g. api.arkenedu.com)
#   EC2_SSH_USER     - SSH user (e.g. ubuntu)
#   EC2_SSH_KEY      - private key (PEM) authorized on the box
#   EC2_APP_DIR      - (optional) repo path on the box; defaults to /home/ubuntu/edutrack/EduTrack
#   BACKEND_BASE_URL - (optional) for the health check; defaults to https://api.arkenedu.com
#
# Never hardcode secrets in YAML — only reference them via ${{ secrets.* }}.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  security:
    name: Pre-deploy security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit (backend deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict || true

      - name: Gitleaks (scan repo for committed secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: security
    environment: production
    steps:
      # The `secrets` context is NOT allowed in step `if:` conditions, so we
      # surface it through an output here and gate the deploy on that instead.
      - name: Check deploy secrets are configured
        id: check
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
        run: |
          if [ -n "$EC2_SSH_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "EC2_SSH_HOST not configured; skipping deploy." >&2
          fi

      - name: SSH in, update code, migrate, restart
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR || '/home/ubuntu/edutrack/EduTrack' }}"

            # CODE-ONLY deploy: update just the backend source from main.
            # docker-compose.yml and backend/.env (gitignored) are managed by
            # hand on the box and are deliberately left untouched, so the
            # server's RDS/compose config is never overwritten by a deploy.
            git fetch origin main
            git checkout origin/main -- backend

            # Rebuild the image with the new code, apply any pending migrations
            # against the live DB, then restart — all via the box's OWN compose
            # file (already wired to RDS). Redis keeps running.
            docker compose build backend worker
            docker compose run --rm backend alembic upgrade head
            docker compose up -d backend worker
            docker image prune -f

  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for /health to report ready
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL || 'https://api.arkenedu.com' }}
        run: |
          # The deploy restarts containers + runs migrations; give it time to
          # come back up. Poll /health for up to ~3 minutes.
          for i in $(seq 1 18); do
            code=$(curl -s -o /tmp/health.out -w "%{http_code}" "${BACKEND_BASE_URL}/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Backend healthy after ${i} attempts."
              cat /tmp/health.out
              exit 0
            fi
            echo "Attempt ${i}: backend returned ${code}, retrying in 10s..."
            sleep 10
          done
          echo "Backend never returned 200 from /health." >&2
          exit 1
