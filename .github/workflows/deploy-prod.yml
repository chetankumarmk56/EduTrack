name: Deploy (production)

# Production deploy pipeline. Stages run in order:
#   security scan -> deploy to EC2 (Docker Compose) -> public health check
#
# Target: a single Ubuntu EC2 box running the prod Docker Compose stack
# (docker-compose.prod.yml: backend + worker + redis) against AWS RDS
# Postgres, fronted by host nginx (TLS via certbot). The deploy SSHes in,
# pulls main, rebuilds the image, runs `alembic upgrade head`, and restarts.
#
# Required GitHub Actions secrets:
#   EC2_SSH_HOST     - public IP or DNS of the EC2 box (e.g. api.arkenedu.com)
#   EC2_SSH_USER     - SSH user (e.g. ubuntu)
#   EC2_SSH_KEY      - private key (PEM) authorized on the box
#   EC2_APP_DIR      - (optional) repo path on the box; defaults to /home/ubuntu/SCHOOL
#   BACKEND_BASE_URL - (optional) for the health check; defaults to https://api.arkenedu.com
#
# Never hardcode secrets in YAML — only reference them via ${{ secrets.* }}.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  security:
    name: Pre-deploy security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit (backend deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict || true

      - name: Gitleaks (scan repo for committed secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: security
    environment: production
    steps:
      # The `secrets` context is NOT allowed in step `if:` conditions, so we
      # surface it through an output here and gate the deploy on that instead.
      - name: Check deploy secrets are configured
        id: check
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
        run: |
          if [ -n "$EC2_SSH_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "EC2_SSH_HOST not configured; skipping deploy." >&2
          fi

      - name: SSH in, pull, migrate, and restart
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR || '/home/ubuntu/SCHOOL' }}"

            # Pull the latest main. backend/.env is gitignored, so the
            # server's secrets (RDS DATABASE_URL, SECRET_KEY, S3, …) survive.
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Build the new image, then apply DB migrations with that image
            # BEFORE swapping the running containers, so the schema is ready.
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            # Roll the stack and reclaim disk from the old image layers.
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for /health to report ready
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL || 'https://api.arkenedu.com' }}
        run: |
          # The deploy restarts containers + runs migrations; give it time to
          # come back up. Poll /health for up to ~3 minutes.
          for i in $(seq 1 18); do
            code=$(curl -s -o /tmp/health.out -w "%{http_code}" "${BACKEND_BASE_URL}/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Backend healthy after ${i} attempts."
              cat /tmp/health.out
              exit 0
            fi
            echo "Attempt ${i}: backend returned ${code}, retrying in 10s..."
            sleep 10
          done
          echo "Backend never returned 200 from /health." >&2
          exit 1
