name: Deploy (production)

# Production deploy pipeline. Stages run in order:
#   security checks -> deploy (backend + frontend) -> migrations -> health check
#
# Backend deploys to Render via a Deploy Hook. Render's startCommand
# (see render.yaml) runs `alembic upgrade head` before booting gunicorn,
# so DB migrations are applied automatically as part of the rollout.
# This workflow then polls /health to confirm the new revision is live.
#
# Required GitHub Actions secrets:
#   RENDER_DEPLOY_HOOK_URL   - Render Deploy Hook for edutrack-backend
#   BACKEND_BASE_URL         - e.g. https://edutrack-backend.onrender.com
#   VERCEL_DEPLOY_HOOK_URL   - (optional) Vercel deploy hook for the frontend
#
# Never hardcode secrets in YAML — only reference them via ${{ secrets.* }}.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  security:
    name: Pre-deploy security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit (backend deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict || true

      - name: Gitleaks (scan repo for committed secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: security
    environment: production
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not configured; skipping." >&2
            exit 0
          fi
          curl --fail-with-body -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy frontend (Vercel hook)
    runs-on: ubuntu-latest
    needs: security
    environment: production
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not configured; skipping." >&2
            exit 0
          fi
          curl --fail-with-body -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Wait for backend /health to report ready
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "BACKEND_BASE_URL not configured; skipping health check." >&2
            exit 0
          fi
          # Render rollouts (build + alembic upgrade + boot) can take a few
          # minutes on the free plan. Poll for up to ~6 minutes.
          for i in $(seq 1 36); do
            code=$(curl -s -o /tmp/health.out -w "%{http_code}" "${BACKEND_BASE_URL}/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Backend healthy after ${i} attempts."
              cat /tmp/health.out
              exit 0
            fi
            echo "Attempt ${i}: backend returned ${code}, retrying in 10s..."
            sleep 10
          done
          echo "Backend never returned 200 from /health." >&2
          exit 1
