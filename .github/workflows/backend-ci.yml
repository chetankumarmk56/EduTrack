name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: flake8 (errors only, fail build on E9/F63/F7/F82)
        run: flake8 . --count --exclude=venv,.venv,.venv311,alembic/versions --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest (with coverage gate)
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci_test_secret_key_must_be_at_least_32_chars_long' }}
          ENVIRONMENT: test
        # --cov-fail-under is a RATCHET: current coverage is ~45% (measured on
        # app + AI), so 40 is a floor that passes today with headroom. Raise it
        # as coverage grows — never above the real number, so CI can't break on
        # an unrelated PR.
        run: >-
          python -m pytest tests/ -v --tb=short
          --cov=app --cov=AI
          --cov-report=term-missing:skip-covered
          --cov-fail-under=40

  build:
    name: Build (Docker image)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: edutrack-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --strict || true

      - name: bandit (static analysis)
        run: bandit -r app -ll -q || true
